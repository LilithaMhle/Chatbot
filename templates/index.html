<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pinky Chatbot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h3>Chats</h3>
      <ul id="topicList">
        {% for topic in topics %}
        <li onclick="loadTopic('{{ topic }}')">{{ topic }}</li>
        {% endfor %}
      </ul>
    </div>

    <!-- Main Chat -->
    <div class="chat-container">
      <h2>💬 Pinky Chatbot</h2>
      <h4 id="chatUser" class="chat-user"></h4>

      <div class="name-input">
        <input type="text" id="userName" placeholder="Enter your name" />
        <button onclick="setName()">Start Chat</button>
      </div>

      <div class="mode-toggle">
        <label><input type="radio" name="mode" value="text" checked> Text</label>
        <label><input type="radio" name="mode" value="voice"> Voice</label>
      </div>

      <div id="chatBox" class="chat-box"></div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
        <button onclick="startVoice()">🎤</button>
      </div>
    </div>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
